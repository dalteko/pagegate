<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up — PageGate</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <div class="view-card">
      <a href="/" class="view-logo">PageGate</a>
      <h2 class="auth-title">Create your account</h2>
      <form id="registerForm" class="auth-form">
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8">
        </div>
        <div class="input-group">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm your password" autocomplete="new-password" required minlength="8">
        </div>
        <p class="auth-error hidden" id="authError"></p>
        <button type="submit" class="btn-primary" id="submitBtn">Sign up</button>
      </form>
      <p class="auth-switch">Already have an account? <a href="/login.html">Log in</a></p>
    </div>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const errorEl = document.getElementById('authError');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.remove('hidden');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error;
          errorEl.classList.remove('hidden');
          return;
        }
        window.location.href = '/dashboard.html';
      } catch {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign up';
      }
    });
  </script>
</body>
</html>
