      <p class="subtitle">Get a password-protected shareable link.</p>
    </header>

    <!-- Upload Section -->
    <section class="upload-section">
      <div class="dropzone" id="dropzone">
        <div class="dropzone-content">
          <svg class="dropzone-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 4L24 32M24 4L16 12M24 4L32 12" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 28v8a4 4 0 004 4h24a4 4 0 004-4v-8" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p class="dropzone-text">Drag & drop your HTML file</p>
          <p class="dropzone-hint">or click to browse</p>
        </div>
        <input type="file" id="fileInput" accept=".html,.htm" hidden>
      </div>
      <p class="file-info" id="fileInfo"></p>
    </section>

    <!-- Preview Section (hidden initially) -->
    <section class="preview-section hidden" id="previewSection">
      <div class="section-header">
        <h2>Preview</h2>
        <button class="btn-text" id="removeFile">Remove file</button>
      </div>
      <div class="preview-frame-wrapper">
        <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin" class="preview-frame"></iframe>
      </div>
    </section>

    <!-- Password Section (hidden initially) -->
    <section class="password-section hidden" id="passwordSection">
      <div class="input-group">
        <label for="passwordInput">Set a password</label>
        <input type="text" id="passwordInput" placeholder="Enter a password for this page" autocomplete="off">
      </div>
      <button class="btn-primary" id="generateBtn">Generate Link</button>
    </section>

    <!-- Result Section (hidden initially) -->
    <section class="result-section hidden" id="resultSection">
      <div class="result-card">
        <p class="result-label">Your link is ready</p>
        <div class="link-row">
          <input type="text" id="linkOutput" readonly>
          <button class="btn-copy" id="copyBtn">Copy</button>
        </div>
        <p class="result-meta" id="expirationNote"></p>
      </div>
      <button class="btn-secondary" id="resetBtn">Share another</button>
    </section>

    <!-- History Section (shown if localStorage has items) -->
    <section class="history-section hidden" id="historySection">
      <div class="section-header">
        <h2>My Pages</h2>
        <button class="btn-text" id="clearHistoryBtn">Clear all</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </section>

    <!-- Feedback Section -->
    <section class="feedback-section" id="feedbackSection">
      <div class="section-header">
        <h2>Feature Requests</h2>
      </div>
      <div class="feedback-form">
        <div class="feedback-input-row">
          <input type="text" id="feedbackInput" placeholder="Suggest a feature..." maxlength="280" autocomplete="off">
          <button class="btn-copy" id="feedbackSubmitBtn">Submit</button>
        </div>
        <p class="feedback-error hidden" id="feedbackError"></p>
      </div>
    </section>

    <footer class="footer">
      <p>No accounts. No sign-up. Pages expire in 30 days.</p>

        <span class="footer-label">Follow the dev</span>
