<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PageGate — Someone sent you a protected page</title>
  <meta name="description" content="This page is password-protected. Enter the password to view it.">
  <meta property="og:title" content="You've been sent a protected page">
  <meta property="og:description" content="Enter the password to unlock this page on PageGate.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://pagegate.app">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="You've been sent a protected page">
  <meta name="twitter:description" content="Enter the password to unlock this page on PageGate.">
  <link rel="stylesheet" href="/style.css">
  <script defer data-domain="pagegate.app" src="https://plausible.io/js/script.tagged-events.js"></script>
</head>
<body>
  <div class="view-container" id="viewContainer">
    <div class="view-card" id="promptCard">
      <a href="/" class="view-logo">PageGate</a>
      <form id="passwordForm">
        <div class="input-group">
          <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off" autofocus>
        </div>
        <button type="submit" class="btn-primary" id="unlockBtn">Unlock</button>
      </form>
      <p class="view-error hidden" id="errorMsg"></p>
    </div>

    <div class="view-card hidden" id="expiredCard">
      <a href="/" class="view-logo">PageGate</a>
      <p class="view-expired">This page is no longer available.</p>
      <a href="/" class="btn-secondary" style="display:block;text-align:center;text-decoration:none;margin-top:16px;">Go to PageGate</a>
    </div>

    <footer class="view-footer">
      <span>Hosted on <a href="/">PageGate</a></span>
      <a href="mailto:abuse@pagegate.io" class="report-link">Report this page</a>
    </footer>
  </div>

  <!-- Sandboxed iframe for rendering unlocked content (no same-origin access) -->
  <iframe id="contentFrame" class="content-frame hidden" sandbox="allow-scripts allow-forms allow-popups" referrerpolicy="no-referrer" style="position:fixed;top:0;left:0;width:100%;height:100%;border:none;background:white;z-index:9999"></iframe>

  <script>
    (() => {
      const pageId = window.location.pathname.slice(1);
      const form = document.getElementById('passwordForm');
      const input = document.getElementById('passwordInput');
      const errorMsg = document.getElementById('errorMsg');
      const unlockBtn = document.getElementById('unlockBtn');
      const promptCard = document.getElementById('promptCard');
      const expiredCard = document.getElementById('expiredCard');
      const viewContainer = document.getElementById('viewContainer');
      const contentFrame = document.getElementById('contentFrame');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = input.value.trim();
        if (!password) {
          input.style.borderColor = '#EF4444';
          input.focus();
          return;
        }

        unlockBtn.disabled = true;
        unlockBtn.textContent = 'Unlocking...';
        errorMsg.classList.add('hidden');

        try {
          const res = await fetch(`/api/verify/${pageId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password }),
          });

          if (res.ok) {
            const data = await res.json();
            // Render in sandboxed iframe — no allow-same-origin, so the
            // uploaded content cannot access PageGate's origin, localStorage,
            // cookies, or API endpoints.
            viewContainer.classList.add('hidden');
            contentFrame.classList.remove('hidden');
            contentFrame.srcdoc = data.html;
            if (window.plausible) plausible('Unlock', { props: { page: pageId } });
          } else if (res.status === 401) {
            errorMsg.textContent = 'Wrong password';
            errorMsg.classList.remove('hidden');
            input.style.borderColor = '#EF4444';
            input.focus();
            input.select();
            if (window.plausible) plausible('Unlock Failed', { props: { page: pageId, reason: 'wrong_password' } });
          } else if (res.status === 404) {
            promptCard.classList.add('hidden');
            expiredCard.classList.remove('hidden');
            if (window.plausible) plausible('Unlock Failed', { props: { page: pageId, reason: 'expired' } });
          } else if (res.status === 429) {
            errorMsg.textContent = 'Too many attempts. Try again later.';
            errorMsg.classList.remove('hidden');
            if (window.plausible) plausible('Unlock Failed', { props: { page: pageId, reason: 'rate_limited' } });
          } else {
            errorMsg.textContent = 'Something went wrong. Please try again.';
            errorMsg.classList.remove('hidden');
          }
        } catch {
          errorMsg.textContent = 'Connection error. Please try again.';
          errorMsg.classList.remove('hidden');
        } finally {
          unlockBtn.disabled = false;
          unlockBtn.textContent = 'Unlock';
        }
      });

      input.addEventListener('input', () => {
        input.style.borderColor = '';
        errorMsg.classList.add('hidden');
      });
    })();
  </script>
</body>
</html>
